name: CI Tests

on:
  push:
    branches:
      - DX-1-HU-1-Funcionalidad-Web-Elementos-Text-Box
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Ejecutar pruebas en headless
        run: ./gradlew clean test -Dheadless.mode=true
        continue-on-error: true  #CLAVE para que siga aunque fallen

      #Obtener token de Xray
      - name: Get Xray Token
        id: xray-auth
        run: |
          TOKEN=$(curl -s -X POST "https://xray.cloud.getxray.app/api/v2/authenticate" \
            -H "Content-Type: application/json" \
            -d '{
              "client_id": "${{ secrets.XRAY_CLIENT_ID }}",
              "client_secret": "${{ secrets.XRAY_CLIENT_SECRET }}"
            }')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      #Enviar resultados a Xray
      - name: Upload results to Xray
        run: |
          curl -X POST "https://xray.cloud.getxray.app/api/v2/import/execution/cucumber" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.xray-auth.outputs.token }}" \
            --data @target/cucumber-reports/Cucumber.json